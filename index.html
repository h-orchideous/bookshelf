<!-- 修复 1：将 edit-book-modal 的 items-center 改为 items-start，并添加顶部间距 -->
<div id="edit-book-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="edit-book-overlay"></div>
    <!-- 修改这里：items-center → items-start pt-10，确保弹窗从顶部显示 -->
    <div class="absolute inset-0 flex items-start justify-center p-4 pointer-events-none pt-10 pb-20 overflow-y-auto">
        <div class="glass-modal w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden pointer-events-auto flex flex-col animate-slide-in my-auto">
            <!-- 内容保持不变 -->
            <div class="flex justify-between items-center p-6 border-b border-stone-200">
                <h2 class="text-xl font-bold text-stone-900 serif">编辑推荐书籍</h2>
                <button id="close-edit-book-btn" class="text-stone-400 hover:text-stone-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 max-h-[70vh]">
                <form id="edit-book-form" class="space-y-6" onsubmit="event.preventDefault();">
                    <!-- 表单内容保持不变 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-stone-700 mb-1">书名 <span class="text-red-500">*</span></label>
                            <input type="text" id="edit-title" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="输入书名">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-stone-700 mb-1">作者 <span class="text-red-500">*</span></label>
                            <input type="text" id="edit-author" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="输入作者姓名">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">分类</label>
                            <input type="text" id="edit-category" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：技术/文学/历史">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">出版年份</label>
                            <input type="text" id="edit-year" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：2023">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-1">书籍简介</label>
                        <textarea id="edit-description" rows="3" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none resize-none" placeholder="简要介绍这本书的内容..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-3">获取方式 <span class="text-red-500">*</span></label>
                        <div class="flex gap-4">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" id="edit-type-offline" name="edit-type" value="offline" class="sr-only peer">
                                <div class="p-4 rounded-lg border-2 border-stone-200 peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all text-center">
                                    <div class="text-2xl mb-1">📖</div>
                                    <div class="font-medium text-stone-900">实体书</div>
                                    <div class="text-xs text-stone-500">需要线下交接</div>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" id="edit-type-online" name="edit-type" value="online" class="sr-only peer">
                                <div class="p-4 rounded-lg border-2 border-stone-200 peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all text-center">
                                    <div class="text-2xl mb-1">💻</div>
                                    <div class="font-medium text-stone-900">线上资源</div>
                                    <div class="text-xs text-stone-500">提供下载链接</div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div id="edit-offline-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">当前持有者 <span class="text-red-500">*</span></label>
                            <input type="text" id="edit-holder" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="姓名或联系方式">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">存放位置 <span class="text-red-500">*</span></label>
                            <input type="text" id="edit-location" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：办公室A-302">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">联系方式</label>
                            <input type="text" id="edit-contact" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="邮箱或手机号">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">借阅规则</label>
                            <input type="text" id="edit-rules" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：请在一周内归还">
                        </div>
                    </div>
                    <div id="edit-online-form" class="space-y-4 hidden">
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">资源链接 <span class="text-red-500">*</span></label>
                            <input type="url" id="edit-url" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="https://...">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-stone-700 mb-1">格式</label>
                                <select id="edit-format" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                                    <option>PDF</option><option>EPUB</option><option>MOBI</option><option>网页</option><option>其他</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-stone-700 mb-1">文件大小</label>
                                <input type="text" id="edit-size" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：2.4MB">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">访问密码（如有）</label>
                            <input type="text" id="edit-password" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="留空表示无需密码">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-stone-700 mb-1">备注说明</label>
                            <input type="text" id="edit-note" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" placeholder="如：需要内网访问权限">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-2">封面颜色</label>
                        <div class="flex gap-3 flex-wrap" id="edit-cover-colors"></div>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t border-stone-200 bg-stone-50 flex justify-end gap-3">
                <button id="cancel-edit-book-btn" class="px-6 py-2 border border-stone-300 rounded-lg text-stone-700 hover:bg-stone-100 transition-colors">取消</button>
                <button id="submit-edit-book-btn" class="px-6 py-2 bg-stone-800 text-white rounded-lg hover:bg-stone-900 transition-colors font-medium">保存更改</button>
            </div>
        </div>
    </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   ⚙️  配置区 — 部署前填入你的 JSONbin 信息
══════════════════════════════════════════ */
const JSONBIN_BIN_ID  = '69a93d93ae596e708f614d79';
const JSONBIN_API_KEY = '$2a$10$uKFcEoyvbyK3SF3lxrKfyuibP5PTEgFcCioxGP4mAGUny4bTnKoI6';

/* ══════════════════════════════════════════
   数据层 — JSONbin.io 云存储
══════════════════════════════════════════ */
const LS_KEY  = 'bookshelf_v1';
const LS_SESS = 'bookshelf_session';
const USE_CLOUD = !!(JSONBIN_BIN_ID && JSONBIN_API_KEY);

async function fetchStore() {
    if (USE_CLOUD) {
        try {
            const r = await fetch(
                `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
                { headers: { 'X-Master-Key': JSONBIN_API_KEY } }
            );
            if (r.ok) {
                const j = await r.json();
                return j.record;
            }
        } catch(e) { console.warn('JSONbin 读取失败，使用本地缓存', e); }
    }
    try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { users: [], books: [], notes: {} };
}

async function saveStore() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(store)); } catch(e) {}
    if (USE_CLOUD) {
        try {
            const r = await fetch(
                `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,
                {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(store)
                }
            );
            if (r.ok) { flashSaved('☁️ 已同步'); return; }
        } catch(e) { console.warn('JSONbin 保存失败', e); }
        flashSaved('⚠️ 同步失败（已保存本地）');
    } else {
        flashSaved('✓ 已保存');
    }
}

let _syncTimer = null;
function startAutoSync() {
    if (!USE_CLOUD) return;
    _syncTimer = setInterval(async () => {
        try {
            const fresh = await fetchStore();
            if (JSON.stringify(fresh) !== JSON.stringify(store)) {
                store = fresh;
                if (!document.getElementById('login-modal').classList.contains('hidden')) {
                    renderUserGrid();
                } else {
                    renderBooks();
                }
            }
        } catch(e) {}
    }, 8000);
}

/* ══════════════════════════════════════════
   App state
══════════════════════════════════════════ */
let store = { users: [], books: [], notes: {} };
let currentUser = null;
let currentBook = null;
let currentFilter = 'all';
let editModeOn = false;
let selectedAvatar = '🐼';

const AVATARS = ['🐼','🦊','🐯','🦁','🐸','🐙','🦄','🐺','🦋','🐻','🐧','🦉','🐨','🦝','🐬','🦔'];

/* ══════════════════════════════════════════
   UI helpers
══════════════════════════════════════════ */
let _saveTimer, _toastTimer;
function flashSaved(msg = '✓ 已保存') {
    const el = document.getElementById('save-badge');
    if (!el) return;
    document.getElementById('save-text').textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => el.classList.add('hidden'), 2500);
}

function showToast(msg, bg = '#16a34a') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = bg;
    el.style.opacity = '1';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2600);
}

function today() { return new Date().toISOString().split('T')[0]; }

/* ══════════════════════════════════════════
   Boot
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
    showLoading(true);
    store = await fetchStore();
    initCoverColors();
    bindStaticEvents();
    startAutoSync();
    showLoading(false);

    const savedUsername = localStorage.getItem(LS_SESS);
    if (savedUsername) {
        const user = store.users.find(u => u.username === savedUsername);
        if (user) {
            currentUser = { username: user.username, displayName: user.displayName, avatar: user.avatar };
            showMainApp();
            return;
        }
    }
    showLoginModal();
});

function showLoading(on) {
    let el = document.getElementById('_loading');
    if (!el) {
        el = document.createElement('div');
        el.id = '_loading';
        el.className = 'fixed inset-0 z-[999] flex items-center justify-center login-bg';
        el.innerHTML = `<div class="text-white text-center">
            <div class="text-5xl mb-4 animate-bounce">📚</div>
            <div class="text-lg font-medium">正在连接书架...</div>
        </div>`;
        document.body.appendChild(el);
    }
    el.style.display = on ? 'flex' : 'none';
}

/* ══════════════════════════════════════════
   Bind all events
══════════════════════════════════════════ */
function bindStaticEvents() {
    document.getElementById('edit-btn')?.addEventListener('click', toggleEditMode);
    document.getElementById('add-user-btn')?.addEventListener('click', showAddUserPanel);
    document.getElementById('back-btn')?.addEventListener('click', showUserPickPanel);
    document.getElementById('confirm-add-btn')?.addEventListener('click', handleAddUser);
    document.getElementById('new-user-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') handleAddUser(); });

    document.getElementById('user-grid')?.addEventListener('click', e => {
        const card = e.target.closest('[data-username]');
        if (!card) return;
        const username = card.dataset.username;
        if (card.dataset.action === 'delete') { deleteUser(username); return; }
        if (!editModeOn) loginAs(username);
    });

    document.getElementById('logout-btn')?.addEventListener('click', logout);
    document.getElementById('export-btn')?.addEventListener('click', exportData);
    document.getElementById('add-book-btn')?.addEventListener('click', openAddBookModal);
    document.getElementById('empty-add-btn')?.addEventListener('click', openAddBookModal);
    document.getElementById('search-input')?.addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        renderBooks(store.books.filter(b =>
            b.title.toLowerCase().includes(t) || b.author.toLowerCase().includes(t)));
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const on = b.dataset.filter === currentFilter;
                b.classList.toggle('bg-stone-800', on);
                b.classList.toggle('text-white', on);
                b.classList.toggle('bg-white', !on);
                b.classList.toggle('text-stone-600', !on);
            });
            renderBooks();
        });
    });

    document.getElementById('add-book-overlay')?.addEventListener('click', closeAddBookModal);
    document.getElementById('close-add-book-btn')?.addEventListener('click', closeAddBookModal);
    document.getElementById('cancel-add-book-btn')?.addEventListener('click', closeAddBookModal);
    document.getElementById('submit-book-btn')?.addEventListener('click', submitBook);
    document.querySelectorAll('input[name="type"]').forEach(r =>
        r.addEventListener('change', toggleAccessForm));

    // 修复 2：确保编辑模态框的事件绑定正确
    document.getElementById('edit-book-overlay')?.addEventListener('click', closeEditBookModal);
    document.getElementById('close-edit-book-btn')?.addEventListener('click', closeEditBookModal);
    document.getElementById('cancel-edit-book-btn')?.addEventListener('click', closeEditBookModal);
    document.getElementById('submit-edit-book-btn')?.addEventListener('click', submitEditBook);
    
    // 修复 3：确保类型切换事件正确绑定
    document.querySelectorAll('input[name="edit-type"]').forEach(r =>
        r.addEventListener('change', toggleEditAccessForm));

    document.getElementById('book-modal-overlay')?.addEventListener('click', closeBookModal);
    document.getElementById('edit-book-btn')?.addEventListener('click', openEditBookModal);
    document.getElementById('delete-book-btn')?.addEventListener('click', deleteCurrentBook);
    document.getElementById('like-btn')?.addEventListener('click', () => rateRecommendation('like'));
    document.getElementById('dislike-btn')?.addEventListener('click', () => rateRecommendation('dislike'));
    document.getElementById('add-note-btn')?.addEventListener('click', addNote);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.addEventListener('keydown', e => {
        if (e.key !== 'Escape') return;
        if (!document.getElementById('book-modal').classList.contains('hidden')) closeBookModal();
        else if (!document.getElementById('add-book-modal').classList.contains('hidden')) closeAddBookModal();
        else if (!document.getElementById('edit-book-modal').classList.contains('hidden')) closeEditBookModal();
    });
}

/* ══════════════════════════════════════════
   Auth / User management
══════════════════════════════════════════ */
function showLoginModal() {
    editModeOn = false;
    document.getElementById('login-modal').classList.remove('hidden');
    document.getElementById('main-app').classList.add('hidden');
    showUserPickPanel();
}

function showUserPickPanel() {
    document.getElementById('user-pick-panel').classList.remove('hidden');
    document.getElementById('add-user-panel').classList.add('hidden');
    renderUserGrid();
}

function showAddUserPanel() {
    document.getElementById('user-pick-panel').classList.add('hidden');
    document.getElementById('add-user-panel').classList.remove('hidden');
    document.getElementById('new-user-name').value = '';
    document.getElementById('add-user-error').classList.add('hidden');
    initAvatarPicker();
    setTimeout(() => document.getElementById('new-user-name').focus(), 80);
}

function renderUserGrid() {
    const grid = document.getElementById('user-grid');
    const editBtn = document.getElementById('edit-btn');
    editBtn.textContent = editModeOn ? '完成' : '管理';

    if (!store.users.length) {
        editModeOn = false;
        grid.innerHTML = `<div class="col-span-3 text-center text-stone-400 text-sm py-4">还没有用户，先添加一个吧</div>`;
        return;
    }

    grid.innerHTML = store.users.map(u => `
        <div class="relative">
            <button data-username="${u.username}" data-action="login"
                class="w-full flex flex-col items-center gap-2 p-3 rounded-xl border-2 transition-all
                    ${editModeOn
                        ? 'border-red-200 bg-red-50 shake-card cursor-default'
                        : 'border-stone-100 hover:border-amber-400 hover:bg-amber-50 cursor-pointer'}">
                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-amber-100 to-amber-200 flex items-center justify-center text-2xl shadow-sm">
                    ${u.avatar}
                </div>
                <span class="text-xs font-medium text-stone-700 truncate w-full text-center">${u.displayName}</span>
            </button>
            ${editModeOn
                ? `<button data-username="${u.username}" data-action="delete"
                        class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-md z-10 text-xs font-bold leading-none">✕</button>`
                : ''}
        </div>`).join('');
}

function toggleEditMode() {
    editModeOn = !editModeOn;
    renderUserGrid();
}

function loginAs(username) {
    const user = store.users.find(u => u.username === username);
    if (!user) return;
    currentUser = { username: user.username, displayName: user.displayName, avatar: user.avatar };
    localStorage.setItem(LS_SESS, username);
    showMainApp();
    showToast(`欢迎，${user.displayName} 👋`);
}

function handleAddUser() {
    const name = document.getElementById('new-user-name').value.trim();
    const errEl = document.getElementById('add-user-error');
    if (!name) { errEl.textContent = '请输入你的名字'; errEl.classList.remove('hidden'); return; }

    let username = name;
    let n = 2;
    while (store.users.find(u => u.username === username)) username = name + (n++);

    const newUser = { username, displayName: name, avatar: selectedAvatar, createdAt: new Date().toISOString() };
    store.users.push(newUser);
    saveStore();

    currentUser = { username, displayName: name, avatar: selectedAvatar };
    localStorage.setItem(LS_SESS, username);
    showMainApp();
    showToast('欢迎加入书架 📚');
}

function deleteUser(username) {
    const user = store.users.find(u => u.username === username);
    if (!user) return;
    if (!confirm(`确定要删除用户「${user.displayName}」吗？\n该用户添加的书籍和备注不会被删除。`)) return;
    store.users = store.users.filter(u => u.username !== username);
    saveStore();
    if (!store.users.length) editModeOn = false;
    renderUserGrid();
    showToast(`已删除 ${user.displayName}`);
}

function logout() {
    localStorage.removeItem(LS_SESS);
    currentUser = null;
    currentBook = null;
    currentFilter = 'all';
    showLoginModal();
}

function showMainApp() {
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('current-user-name').textContent = currentUser.displayName;
    document.getElementById('user-avatar').textContent = currentUser.avatar;
    renderBooks();
    renderLeaderboards();
}

function initAvatarPicker() {
    selectedAvatar = AVATARS[0];
    document.getElementById('avatar-picker').innerHTML = AVATARS.map((a, i) => `
        <button type="button" data-emoji="${a}"
            class="avatar-opt w-10 h-10 rounded-full flex items-center justify-center text-xl border-2 transition-all hover:scale-110
                   ${i === 0 ? 'border-amber-500 bg-amber-50 scale-110' : 'border-transparent bg-stone-100'}">
            ${a}
        </button>`).join('');

    document.getElementById('avatar-picker').addEventListener('click', e => {
        const btn = e.target.closest('.avatar-opt');
        if (!btn) return;
        selectedAvatar = btn.dataset.emoji;
        document.querySelectorAll('.avatar-opt').forEach(b => {
            const active = b === btn;
            b.classList.toggle('border-amber-500', active);
            b.classList.toggle('bg-amber-50', active);
            b.classList.toggle('scale-110', active);
            b.classList.toggle('border-transparent', !active);
            b.classList.toggle('bg-stone-100', !active);
        });
    }, { once: false });
}

function initCoverColors() {
    document.getElementById('cover-colors').innerHTML = [1,2,3,4,5,6,7,8].map(i => `
        <label class="cursor-pointer">
            <input type="radio" name="cover" value="book-cover-gradient-${i}" ${i===1?'checked':''} class="sr-only peer">
            <div class="w-12 h-12 rounded-lg book-cover-gradient-${i} peer-checked:ring-4 peer-checked:ring-amber-500 peer-checked:ring-offset-2 transition-all hover:scale-110"></div>
        </label>`).join('');
}

function renderBooks(books = store.books) {
    const shelf = document.getElementById('bookshelf');
    const empty = document.getElementById('empty-state');
    shelf.innerHTML = '';

    let list = books;
    if      (currentFilter === 'my-books')  list = books.filter(b => b.addedBy === currentUser.username);
    else if (currentFilter === 'available') list = books.filter(b => b.status === 'available');
    else if (currentFilter === 'borrowed')  list = books.filter(b => b.status === 'borrowed');
    else if (currentFilter === 'online')    list = books.filter(b => b.type === 'online');
    else if (currentFilter === 'offline')   list = books.filter(b => b.type === 'offline');

    document.getElementById('total-books').textContent = `${list.length} 本书在架`;
    empty.classList.toggle('hidden', list.length > 0);
    if (!list.length) return;

    list.forEach((book, i) => {
        const card = document.createElement('div');
        card.className = 'book-spine cursor-pointer animate-fade-in';
        card.style.animationDelay = `${i * 0.04}s`;

        const borrowed = book.status === 'borrowed';
        const recs = book.recommendations || [];
        const likes = recs.filter(r => r.action === 'like').length;
        const dislikes = recs.filter(r => r.action === 'dislike').length;
        
        card.innerHTML = `
            <div class="relative bg-white rounded-lg shadow-md overflow-hidden border border-stone-200 h-full flex flex-col">
                <div class="h-48 ${book.cover} relative flex items-center justify-center p-4">
                    <div class="text-white text-center">
                        <div class="text-3xl mb-2">${book.type === 'online' ? '💻' : '📖'}</div>
                        <h3 class="font-bold text-lg leading-tight serif line-clamp-3 drop-shadow-md">${book.title}</h3>
                        <p class="text-sm text-white/90 mt-2 drop-shadow">${book.author}</p>
                    </div>
                    <div class="absolute top-2 right-2">
                        <span class="w-2 h-2 ${borrowed ? 'bg-amber-500' : 'bg-green-500'} rounded-full block ring-2 ring-white shadow"></span>
                    </div>
                    ${book.addedBy === currentUser.username ? '<div class="absolute top-2 left-2 bg-white/90 text-stone-800 text-xs px-2 py-1 rounded-full font-medium">我的推荐</div>' : ''}
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs text-stone-500">${book.category || '未分类'}</span>
                        <span class="text-xs px-2 py-0.5 rounded-full ${borrowed ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'}">${borrowed ? '借出' : '可借'}</span>
                    </div>
                    ${borrowed ? `<div class="text-xs text-amber-600 mt-1 truncate">借：${book.currentBorrower}</div>` : ''}
                    <p class="text-sm text-stone-600 line-clamp-2 mb-3 flex-1 mt-1">${book.description || '暂无简介'}</p>
                    <div class="flex items-center justify-between text-xs text-stone-400 pt-2 border-t border-stone-100">
                        <span>${book.readers?.length || 0} 人读过</span>
                        <span class="flex items-center gap-1.5">
                            ${recs.length ? `<span class="text-green-500">👍${likes}</span><span class="text-red-400">👎${dislikes}</span>` : `<span>${book.type==='online'?'线上':'实体'}</span>`}
                        </span>
                    </div>
                </div>
            </div>`;

        card.addEventListener('click', () => openBookModal(book));
        shelf.appendChild(card);
    });
    renderLeaderboards();
}

function openAddBookModal() {
    document.getElementById('add-book-modal').classList.remove('hidden');
    document.getElementById('add-book-form').reset();
    toggleAccessForm();
    initCoverColors();
}

function closeAddBookModal() { 
    document.getElementById('add-book-modal').classList.add('hidden'); 
}

function toggleAccessForm() {
    const type = document.querySelector('input[name="type"]:checked')?.value || 'offline';
    document.getElementById('offline-form').classList.toggle('hidden', type !== 'offline');
    document.getElementById('online-form').classList.toggle('hidden', type !== 'online');
}

function submitBook() {
    const fd = new FormData(document.getElementById('add-book-form'));
    const title = fd.get('title')?.trim();
    const author = fd.get('author')?.trim();
    if (!title || !author) { showToast('请填写书名和作者', '#dc2626'); return; }

    const type = fd.get('type');
    let access;
    if (type === 'offline') {
        const holder = fd.get('holder')?.trim();
        const location = fd.get('location')?.trim();
        if (!holder || !location) { showToast('请填写持有者和存放位置', '#dc2626'); return; }
        access = { type:'offline', holder, location, contact: fd.get('contact')||'', rules: fd.get('rules')||'无特殊要求' };
    } else {
        const url = fd.get('url')?.trim();
        if (!url) { showToast('请填写资源链接', '#dc2626'); return; }
        access = { type:'online', url, format: fd.get('format')||'PDF', size: fd.get('size')||'', password: fd.get('password')||'', note: fd.get('note')||'' };
    }

    const book = {
        id: Date.now(),
        title, author,
        category: fd.get('category') || '未分类',
        year: fd.get('year') || '',
        cover: fd.get('cover') || 'book-cover-gradient-1',
        type, access,
        status: 'available',
        currentBorrower: null,
        borrowedAt: null,
        description: fd.get('description') || '',
        readers: [],
        addedBy: currentUser.username,
        addedByName: currentUser.displayName,
        addedAt: today(),
        recommendations: []
    };

    store.books.push(book);
    saveStore();
    closeAddBookModal();
    renderBooks();
    showToast('书籍推荐成功 ✓');
}

// 修复 4：优化保存逻辑，确保数据完整性和错误处理
async function submitEditBook() {
    if (!currentBook || currentBook.addedBy !== currentUser.username) {
        showToast('没有权限编辑此书', '#dc2626');
        return;
    }

    try {
        // 读取基本信息
        const title = document.getElementById('edit-title').value.trim();
        const author = document.getElementById('edit-author').value.trim();
        
        if (!title) { showToast('请填写书名', '#dc2626'); return; }
        if (!author) { showToast('请填写作者', '#dc2626'); return; }

        const type = document.getElementById('edit-type-online').checked ? 'online' : 'offline';
        const cover = document.querySelector('input[name="edit-cover"]:checked')?.value || currentBook.cover || 'book-cover-gradient-1';

        let access;
        if (type === 'offline') {
            const holder = document.getElementById('edit-holder').value.trim();
            const location = document.getElementById('edit-location').value.trim();
            if (!holder) { showToast('请填写持有者', '#dc2626'); return; }
            if (!location) { showToast('请填写存放位置', '#dc2626'); return; }
            access = {
                type: 'offline',
                holder,
                location,
                contact: document.getElementById('edit-contact').value.trim(),
                rules: document.getElementById('edit-rules').value.trim() || '无特殊要求'
            };
        } else {
            const url = document.getElementById('edit-url').value.trim();
            if (!url) { showToast('请填写资源链接', '#dc2626'); return; }
            access = {
                type: 'online',
                url,
                format: document.getElementById('edit-format').value || 'PDF',
                size: document.getElementById('edit-size').value.trim(),
                password: document.getElementById('edit-password').value.trim(),
                note: document.getElementById('edit-note').value.trim()
            };
        }

        // 找到书籍索引并更新
        const bookIndex = store.books.findIndex(b => b.id === currentBook.id);
        if (bookIndex === -1) { 
            showToast('书籍数据异常，未找到该书籍', '#dc2626'); 
            return; 
        }

        // 保留原有数据，合并更新
        store.books[bookIndex] = {
            ...store.books[bookIndex],
            title,
            author,
            category: document.getElementById('edit-category').value.trim() || '未分类',
            year: document.getElementById('edit-year').value.trim(),
            description: document.getElementById('edit-description').value.trim(),
            cover,
            type,
            access,
            // 保留以下字段不变
            id: store.books[bookIndex].id,
            status: store.books[bookIndex].status,
            currentBorrower: store.books[bookIndex].currentBorrower,
            borrowedAt: store.books[bookIndex].borrowedAt,
            readers: store.books[bookIndex].readers || [],
            addedBy: store.books[bookIndex].addedBy,
            addedByName: store.books[bookIndex].addedByName,
            addedAt: store.books[bookIndex].addedAt,
            recommendations: store.books[bookIndex].recommendations || []
        };
        
        // 更新当前引用
        currentBook = store.books[bookIndex];

        // 保存到存储（使用 await 确保完成）
        await saveStore();
        
        // 关闭编辑框并刷新
        closeEditBookModal();
        renderBooks();
        
        // 如果详情弹窗是打开的，刷新它
        if (!document.getElementById('book-modal').classList.contains('hidden')) {
            openBookModal(currentBook);
        }
        
        showToast('推荐书籍已更新 ✓');
    } catch (error) {
        console.error('保存书籍失败:', error);
        showToast('保存失败，请重试', '#dc2626');
    }
}

function openBookModal(bookRef) {
    currentBook = store.books.find(b => b.id === bookRef.id) || bookRef;

    document.getElementById('modal-title').textContent       = currentBook.title;
    document.getElementById('modal-author').textContent      = currentBook.author;
    document.getElementById('modal-category').textContent    = currentBook.category || '未分类';
    document.getElementById('modal-year').textContent        = currentBook.year || '未知年份';
    document.getElementById('modal-added-by').textContent    = `推荐人: ${currentBook.addedByName || currentBook.addedBy}`;
    document.getElementById('modal-description').textContent = currentBook.description || '暂无简介';

    const cover = document.getElementById('modal-cover');
    cover.className = `w-40 h-56 rounded-lg shadow-2xl mb-4 transform hover:scale-105 transition-transform duration-300 ${currentBook.cover} flex items-center justify-center text-white text-center p-4`;
    cover.innerHTML = `<div><div class="text-4xl mb-2">${currentBook.type==='online'?'💻':'📖'}</div><h3 class="font-bold text-xl serif drop-shadow-md">${currentBook.title}</h3></div>`;

    refreshModalStatus();
    renderLocationPanel();
    renderAccessDetails();
    renderRecommendationRatings();
    document.getElementById('owner-actions').classList.toggle('hidden', currentBook.addedBy !== currentUser.username);
    renderReaders(currentBook.readers || []);
    renderNotes(currentBook.id);
    switchTab('info');
    document.getElementById('book-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function refreshModalStatus() {
    const statusEl   = document.getElementById('modal-status');
    const actionBtn  = document.getElementById('action-btn');
    const returnDiv  = document.getElementById('return-btn-wrap');
    const feedbackDiv= document.getElementById('recommendation-feedback');
    const borrowed   = currentBook.status === 'borrowed';

    if (!borrowed) {
        statusEl.className    = 'inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 mb-3';
        statusEl.textContent  = '可借阅';
        actionBtn.className   = 'w-full bg-stone-800 text-white py-2.5 rounded-lg hover:bg-stone-900 transition-colors text-sm font-medium';
        actionBtn.textContent = currentBook.type === 'online' ? '获取资源' : '我要借阅';
        actionBtn.onclick     = () => handleAccess();
        returnDiv.innerHTML   = '';
    } else {
        statusEl.className    = 'inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-800 mb-3';
        statusEl.textContent  = `已借出 · ${currentBook.currentBorrower}`;
        actionBtn.className   = 'w-full bg-stone-200 text-stone-500 py-2.5 rounded-lg text-sm font-medium cursor-default';
        actionBtn.textContent = '预约提醒';
        actionBtn.onclick     = () => showToast('📬 已设置提醒');
        returnDiv.innerHTML   = currentBook.currentBorrower === currentUser.displayName
            ? `<button id="return-btn" class="w-full mt-2 bg-blue-50 text-blue-700 border border-blue-200 py-2.5 rounded-lg hover:bg-blue-100 transition-colors text-sm font-medium">归还书籍</button>`
            : '';
        const retBtn = document.getElementById('return-btn');
        if (retBtn) retBtn.addEventListener('click', returnBook);
    }

    const isRecommender = currentBook.addedBy === currentUser.username;
    if (isRecommender) {
        feedbackDiv.classList.add('hidden');
    } else {
        feedbackDiv.classList.remove('hidden');
        const myVote     = (currentBook.recommendations || []).find(r => r.user === currentUser.username);
        const likeBtn    = document.getElementById('like-btn');
        const dislikeBtn = document.getElementById('dislike-btn');
        likeBtn.className    = `flex-1 py-2 rounded-lg text-sm font-medium border transition-colors ${myVote?.action === 'like'    ? 'bg-green-500 text-white border-green-500' : 'bg-green-50 text-green-600 border-green-200 hover:bg-green-100'}`;
        dislikeBtn.className = `flex-1 py-2 rounded-lg text-sm font-medium border transition-colors ${myVote?.action === 'dislike' ? 'bg-red-500 text-white border-red-500'     : 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100'}`;
        likeBtn.textContent    = myVote?.action === 'like'    ? '👍 已赞' : '👍 点赞';
        dislikeBtn.textContent = myVote?.action === 'dislike' ? '👎 已踩' : '👎 点踩';
    }
}

function renderLocationPanel() {
    const el = document.getElementById('modal-location');
    if (currentBook.type === 'online') {
        el.innerHTML = `<div class="flex items-center gap-2 mb-1"><span>💻</span><span class="font-medium">线上资源</span></div>
            <div class="text-xs text-stone-500">格式: ${currentBook.access?.format||'未知'}</div>`;
    } else {
        const who = currentBook.status === 'borrowed'
            ? `<span class="text-amber-700 font-medium">借阅中 · ${currentBook.currentBorrower}</span>`
            : `<span class="font-medium">${currentBook.access?.holder}</span>`;
        el.innerHTML = `<div class="flex items-center gap-2 mb-1"><span>📍</span>${who}</div>
            <div class="text-xs text-stone-500">${currentBook.access?.location||''}</div>`;
    }
}

function renderAccessDetails() {
    const el = document.getElementById('modal-access-details');
    if (currentBook.type === 'online') {
        el.innerHTML = `
            <div class="flex justify-between py-2 border-b border-stone-100"><span>链接</span>
                <a href="${currentBook.access?.url}" target="_blank" class="text-amber-700 hover:underline truncate max-w-xs">${currentBook.access?.url}</a></div>
            <div class="flex justify-between py-2 border-b border-stone-100"><span>格式</span><span>${currentBook.access?.format||'-'}</span></div>
            ${currentBook.access?.password?`<div class="flex justify-between py-2 border-b border-stone-100"><span>密码</span><span class="font-mono bg-stone-100 px-2 rounded">${currentBook.access.password}</span></div>`:''}
            ${currentBook.access?.note?`<div class="mt-2 text-amber-700 bg-amber-50 p-2 rounded text-xs">${currentBook.access.note}</div>`:''}`;
    } else {
        el.innerHTML = `
            <div class="flex justify-between py-2 border-b border-stone-100"><span>持有者</span><span class="font-medium">${currentBook.access?.holder}</span></div>
            <div class="flex justify-between py-2 border-b border-stone-100"><span>位置</span><span>${currentBook.access?.location}</span></div>
            ${currentBook.access?.contact?`<div class="flex justify-between py-2 border-b border-stone-100"><span>联系方式</span><span class="text-amber-700">${currentBook.access.contact}</span></div>`:''}
            ${currentBook.status==='borrowed'?`<div class="flex justify-between py-2 border-b border-stone-100"><span>借阅人</span><span class="text-amber-700 font-medium">${currentBook.currentBorrower}</span></div>
                <div class="flex justify-between py-2 border-b border-stone-100"><span>借出日期</span><span>${currentBook.borrowedAt||'-'}</span></div>`:''}
            <div class="mt-3 text-stone-500 text-xs bg-stone-50 p-3 rounded"><span class="font-medium">借阅规则：</span>${currentBook.access?.rules||'无特殊要求'}</div>`;
    }
}

function renderRecommendationRatings() {
    const el      = document.getElementById('ratings-display');
    const ratings = currentBook.recommendations || [];
    const likes   = ratings.filter(r => r.action === 'like').length;
    const dislikes= ratings.filter(r => r.action === 'dislike').length;
    if (!ratings.length) {
        el.innerHTML = '<div class="text-xs text-stone-400">暂无评价</div>';
        return;
    }
    el.innerHTML = `<div class="flex items-center gap-3">
        <span class="flex items-center gap-1 text-sm font-medium text-green-600 bg-green-50 px-3 py-1 rounded-full">👍 ${likes}</span>
        <span class="flex items-center gap-1 text-sm font-medium text-red-500 bg-red-50 px-3 py-1 rounded-full">👎 ${dislikes}</span>
    </div>`;
}

function closeBookModal() {
    document.getElementById('book-modal').classList.add('hidden');
    document.body.style.overflow = '';
    currentBook = null;
}

function handleAccess() {
    if (currentBook.type === 'online') {
        window.open(currentBook.access?.url, '_blank');
        if (!currentBook.readers?.find(r => r.name === currentUser.displayName)) {
            if (!currentBook.readers) currentBook.readers = [];
            currentBook.readers.unshift({ name: currentUser.displayName, date: today(), avatar: currentUser.avatar });
            saveStore();
            renderReaders(currentBook.readers);
        }
        return;
    }
    if (currentBook.status === 'borrowed') {
        showToast(`该书已被「${currentBook.currentBorrower}」借出`, '#d97706');
        return;
    }
    if (!confirm(`确认借阅《${currentBook.title}》？\n持有者：${currentBook.access?.holder}，位置：${currentBook.access?.location}\n\n确认后书籍状态将更新为「已借出」`)) return;

    currentBook.status = 'borrowed';
    currentBook.currentBorrower = currentUser.displayName;
    currentBook.borrowedAt = today();
    if (!currentBook.readers) currentBook.readers = [];
    if (!currentBook.readers.find(r => r.name === currentUser.displayName)) {
        currentBook.readers.unshift({ name: currentUser.displayName, date: today(), avatar: currentUser.avatar });
    }
    saveStore();
    refreshModalStatus();
    renderLocationPanel();
    renderAccessDetails();
    renderReaders(currentBook.readers);
    renderBooks();
    showToast(`📗 借阅成功！请联系 ${currentBook.access?.holder} 取书`);
}

function returnBook() {
    if (!currentBook || currentBook.status !== 'borrowed') return;
    if (!confirm(`确认归还《${currentBook.title}》？`)) return;
    currentBook.status = 'available';
    currentBook.currentBorrower = null;
    currentBook.borrowedAt = null;
    saveStore();
    refreshModalStatus();
    renderLocationPanel();
    renderAccessDetails();
    renderBooks();
    showToast('📘 已归还，状态已更新', '#2563eb');
}

function rateRecommendation(action) {
    if (!currentBook || currentBook.addedBy === currentUser.username) return;
    if (!currentBook.recommendations) currentBook.recommendations = [];
    const existing = currentBook.recommendations.find(r => r.user === currentUser.username);
    if (existing && existing.action === action) {
        currentBook.recommendations = currentBook.recommendations.filter(r => r.user !== currentUser.username);
        showToast('已取消投票');
    } else {
        currentBook.recommendations = currentBook.recommendations.filter(r => r.user !== currentUser.username);
        currentBook.recommendations.push({ user: currentUser.username, action });
        showToast(action === 'like' ? '👍 已点赞推荐人' : '👎 已点踩推荐人');
    }
    saveStore();
    refreshModalStatus();
    renderRecommendationRatings();
    renderLeaderboards();
    renderBooks();
}

function deleteCurrentBook() {
    if (!currentBook) return;
    if (!confirm(`确定要删除《${currentBook.title}》吗？`)) return;
    store.books = store.books.filter(b => b.id !== currentBook.id);
    delete store.notes[currentBook.id];
    saveStore();
    closeBookModal();
    renderBooks();
    showToast('推荐书籍已删除');
}

function renderReaders(readers) {
    document.getElementById('reader-count').textContent = `${readers?.length || 0} 位读者`;
    const el = document.getElementById('readers-list');
    if (!readers?.length) { el.innerHTML = '<div class="text-center text-stone-400 py-8">暂无阅读记录</div>'; return; }
    el.innerHTML = readers.map(r => `
        <div class="flex items-center gap-3 p-3 bg-white rounded-lg border border-stone-200">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-amber-100 to-amber-200 flex items-center justify-center text-xl">${r.avatar}</div>
            <div><div class="font-medium text-stone-900">${r.name}</div><div class="text-xs text-stone-500">阅读于 ${r.date}</div></div>
        </div>`).join('');
}

function renderNotes(bookId) {
    const el = document.getElementById('notes-list');
    const notes = store.notes[bookId] || [];
    if (!notes.length) { el.innerHTML = '<div class="text-center text-stone-400 py-8">暂无备注，成为第一个写备注的人吧</div>'; return; }
    el.innerHTML = notes.map(n => `
        <div class="note-card rounded-lg p-4 shadow-sm">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-stone-800">${n.author}</span>
                    <span class="text-xs text-stone-500">${n.date}</span>
                </div>
                <div class="flex gap-0.5">
                    ${[1,2,3,4,5].map(i=>`<svg class="w-4 h-4 ${i<=n.rating?'text-amber-400 fill-current':'text-stone-300'}" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}
                </div>
            </div>
            <p class="text-stone-700 text-sm leading-relaxed">${n.content}</p>
        </div>`).join('');
}

function addNote() {
    if (!currentBook) return;
    const content = prompt('请输入您的阅读备注：');
    if (!content?.trim()) return;
    const rating = Math.min(5, Math.max(1, parseInt(prompt('请评分（1-5星）：', '5')) || 5));
    if (!store.notes[currentBook.id]) store.notes[currentBook.id] = [];
    store.notes[currentBook.id].unshift({ author: currentUser.displayName, date: today(), content: content.trim(), rating });
    if (!currentBook.readers?.find(r => r.name === currentUser.displayName)) {
        if (!currentBook.readers) currentBook.readers = [];
        currentBook.readers.unshift({ name: currentUser.displayName, date: today(), avatar: currentUser.avatar });
    }
    saveStore();
    renderNotes(currentBook.id);
    showToast('备注已保存 ✓');
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('tab-active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
}

function calcLeaderboard() {
    const stats = {};
    store.users.forEach(u => {
        stats[u.username] = { username: u.username, displayName: u.displayName, avatar: u.avatar, likes: 0, dislikes: 0, books: 0 };
    });
    store.books.forEach(book => {
        const by = book.addedBy;
        if (!stats[by]) stats[by] = { username: by, displayName: book.addedByName || by, avatar: '📚', likes: 0, dislikes: 0, books: 0 };
        stats[by].books++;
        (book.recommendations || []).forEach(r => {
            if (r.action === 'like')    stats[by].likes++;
            if (r.action === 'dislike') stats[by].dislikes++;
        });
    });
    return Object.values(stats).filter(s => s.books > 0);
}

function renderLeaderboards() {
    const all = calcLeaderboard();

    const likeList    = [...all].sort((a,b) => b.likes - a.likes);
    const likeTitleEl = document.getElementById('like-board-title');
    const likeEl      = document.getElementById('like-leaderboard');
    if (!likeEl) return;
    const topLiker = likeList.find(s => s.likes > 0);
    if (likeTitleEl) likeTitleEl.innerHTML = topLiker
        ? `大家都爱<span class="text-amber-400 font-black"> ${topLiker.displayName.toUpperCase()}</span>`
        : '大家都爱…';
    const likeFiltered = likeList.filter(s => s.likes > 0);
    likeEl.innerHTML = likeFiltered.length ? likeFiltered.map((s,i) => {
        const medals = ['🥇','🥈','🥉'];
        const isMe = s.username === currentUser?.username;
        return `<div class="flex items-center gap-2 px-2 py-1.5 rounded-xl transition-colors ${isMe?'bg-amber-50 border border-amber-200':'hover:bg-stone-50'}">
            <div class="w-5 text-center flex-shrink-0">${medals[i]||`<span class="text-xs font-bold text-stone-400">${i+1}</span>`}</div>
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-amber-100 to-amber-200 flex items-center justify-center text-sm flex-shrink-0">${s.avatar}</div>
            <div class="flex-1 min-w-0"><div class="text-xs font-semibold text-stone-800 truncate">${s.displayName}${isMe?' <span class="text-amber-500">我</span>':''}</div><div class="text-xs text-stone-400">${s.books}本推荐</div></div>
            <div class="text-xs font-bold text-green-600 flex-shrink-0">👍${s.likes}</div>
        </div>`;
    }).join('') : '<div class="text-xs text-stone-400 text-center py-3">暂无数据</div>';

    const dislikeList    = [...all].sort((a,b) => b.dislikes - a.dislikes);
    const dislikeTitleEl = document.getElementById('dislike-board-title');
    const dislikeEl      = document.getElementById('dislike-leaderboard');
    if (!dislikeEl) return;
    const topDisliker = dislikeList.find(s => s.dislikes > 0);
    if (dislikeTitleEl) dislikeTitleEl.innerHTML = topDisliker
        ? `大家都雷<span class="text-stone-900 font-black"> ${topDisliker.displayName.toUpperCase()}</span>`
        : '大家都雷…';
    const dislikeFiltered = dislikeList.filter(s => s.dislikes > 0);
    dislikeEl.innerHTML = dislikeFiltered.length ? dislikeFiltered.map((s,i) => {
        const medals = ['💀','😵','😤'];
        const isMe = s.username === currentUser?.username;
        return `<div class="flex items-center gap-2 px-2 py-1.5 rounded-xl transition-colors ${isMe?'bg-red-50 border border-red-100':'hover:bg-stone-50'}">
            <div class="w-5 text-center flex-shrink-0">${medals[i]||`<span class="text-xs font-bold text-stone-400">${i+1}</span>`}</div>
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-stone-100 to-stone-200 flex items-center justify-center text-sm flex-shrink-0">${s.avatar}</div>
            <div class="flex-1 min-w-0"><div class="text-xs font-semibold text-stone-800 truncate">${s.displayName}${isMe?' <span class="text-red-400">我</span>':''}</div><div class="text-xs text-stone-400">${s.books}本推荐</div></div>
            <div class="text-xs font-bold text-red-500 flex-shrink-0">👎${s.dislikes}</div>
        </div>`;
    }).join('') : '<div class="text-xs text-stone-400 text-center py-3">暂无数据</div>';
}

function exportData() {
    const blob = new Blob([JSON.stringify(store, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: `bookshelf-${today()}.json` });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('备份文件已下载 ✓');
}
</script>
